    *{box-sizing:border-box;margin:0;padding:0}
    html,body,#root{height:100%;overflow:hidden}

      color:#f0eeff;
    }

    ::-webkit-scrollbar{width:4px}
    ::-webkit-scrollbar-track{background:transparent}
    ::-webkit-scrollbar-thumb{background:rgba(124,58,237,.4);border-radius:10px}

    textarea,input,select,button{font-family:inherit}

    @keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
    @keyframes bounce{0%,80%,100%{transform:translateY(0);opacity:.3}40%{transform:translateY(-5px);opacity:1}}
    @keyframes ripple{0%{transform:scale(1);opacity:1}100%{transform:scale(2.5);opacity:0}}
    @keyframes spin{to{transform:rotate(360deg)}}

    .glass{
      background: linear-gradient(180deg, rgba(255,255,255,.07), rgba(255,255,255,.02));
      border: 1px solid rgba(120,100,255,.12);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }

    .btn{
      padding: 9px 16px;border-radius: 12px;cursor:pointer;font-size:13;font-weight:900;
      border:1px solid rgba(120,100,255,.14);background:rgba(18,18,50,.35);color:#f0eeff;
      transition: transform .08s ease, background .12s ease, border-color .12s ease, opacity .12s ease;
    }
    .btn:active{transform: translateY(1px)}
    .btn-primary{
      background: linear-gradient(135deg, #7c3aed, #8b5cf6);
      border:none;color:white;
    }
    .btn-ghost{background:transparent;border:1px solid rgba(120,100,255,.14)}
    .pill{

      padding:6px 12px;border-radius:999px;font-size:12;font-weight:800;

    /* ----------------------------- Date key for “today” tracking ----------------------------- */
    function dayKeyJohannesburg(d=new Date()){
      const parts = new Intl.DateTimeFormat('en-CA',{
        timeZone:'Africa/Johannesburg',year:'numeric',month:'2-digit',day:'2-digit'
      }).formatToParts(d);
      const get=t=>parts.find(p=>p.type===t)?.value;
      return `${get('year')}-${get('month')}-${get('day')}`;
    }

    const LS_KEY="tiyani_sent_events_onefile_v1";
    function loadSentEvents(){
      try{ return JSON.parse(localStorage.getItem(LS_KEY)||"[]"); }catch{ return []; }
    }
    function saveSentEvents(evts){
      localStorage.setItem(LS_KEY, JSON.stringify(evts));
    }
    function addSentEvent(evt){
      const evts=loadSentEvents();
      evts.push(evt);
      saveSentEvents(evts);
    }
    function clearSentEvents(){
      localStorage.removeItem(LS_KEY);
    }

    /* ----------------------------- Mock API + Sync ----------------------------- */
    async function apiGetJSON(path){
      // mock fallback: simulate live sync endpoint (in real world would fetch)
      if(path === "/api/sync/today"){
        const key = dayKeyJohannesburg(new Date());
        const evts = loadSentEvents().filter(x=>x.dayKey===key);
        const gmail = evts.filter(x=>x.channel==="gmail");
        const linkedin = evts.filter(x=>x.channel==="linkedin");
        return {
          gmail:{count:gmail.length, last:gmail.length?new Date(gmail[gmail.length-1].at).toLocaleTimeString():null, unreadCount:GMAIL_INBOX_DEMO.filter(m=>m.unread).length},
          linkedin:{count:linkedin.length, last:linkedin.length?new Date(linkedin[linkedin.length-1].at).toLocaleTimeString():null, unreadCount:LI_NOTIFS_DEMO.filter(n=>n.unread).length}
        };
      }
      throw new Error("mock only");
    }
    async function apiPostJSON(path,body){
      if(path === "/api/gmail/send" || path === "/api/linkedin/sendMessage"){
        return { messageId:"mock_"+Date.now(), id:"mock_"+Date.now() };

      throw new Error("mock only");
    }

    function useTodaySync(){
      const [sync,setSync] = useState({status:"demo",gmail:{count:0,last:null,unreadCount:0},linkedin:{count:0,last:null,unreadCount:0},error:null});
      const refresh = async()=>{
        try{
          const data = await apiGetJSON("/api/sync/today");
          setSync({status:"live",gmail:{count:data.gmail.count,last:data.gmail.last,unreadCount:data.gmail.unreadCount},linkedin:{count:data.linkedin.count,last:data.linkedin.last,unreadCount:data.linkedin.unreadCount},error:null});
        }catch(e){
          const key = dayKeyJohannesburg(new Date());
          const evts=loadSentEvents().filter(x=>x.dayKey===key);
          const gmail = evts.filter(x=>x.channel==="gmail");
          const linkedin = evts.filter(x=>x.channel==="linkedin");
          setSync({status:"demo",gmail:{count:gmail.length,last:gmail.length?new Date(gmail[gmail.length-1].at).toLocaleTimeString():null,unreadCount:GMAIL_INBOX_DEMO.filter(m=>m.unread).length},linkedin:{count:linkedin.length,last:linkedin.length?new Date(linkedin[linkedin.length-1].at).toLocaleTimeString():null,unreadCount:LI_NOTIFS_DEMO.filter(n=>n.unread).length},error:null});
        }
      };
      useEffect(()=>{ refresh(); const t=setInterval(refresh,30000); return()=>clearInterval(t); },[]);
      return {sync,refresh};
    }

          </div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:10,marginBottom:16}}>{blocks.map(b=><Card key={b.l} style={{padding:"12px 14px"}}><div style={{fontSize:12,fontWeight:950,color:b.color}}>{b.l}</div><div style={{fontSize:22,fontWeight:1000,color:b.color}}>{b.v}</div><div style={{fontSize:11,color:C.ts}}>{b.s}</div></Card>)}</div>
          <Card glow style={{padding:"16px"}}><div style={{display:"flex",justifyContent:"space-between",marginBottom:12}}><div><div style={{fontWeight:1000}}>Sent today tracker</div><div className="muted" style={{fontSize:11}}>Auto-updates</div></div><div className="pill"><span className="mono">{nowStr}</span></div></div><div style={{display:"grid",gridTemplateColumns:"repeat(2,1fr)",gap:10}}><div style={{background:C.bg3,borderRadius:14,padding:12}}><div className="muted" style={{fontSize:11}}>Gmail sent today</div><div style={{fontSize:20,fontWeight:1000,color:C.g}}>{todaySentG.count}</div><div className="muted" style={{fontSize:11}}>Last: {todaySentG.last||"—"}</div></div><div style={{background:C.bg3,borderRadius:14,padding:12}}><div className="muted" style={{fontSize:11}}>LinkedIn sent today</div><div style={{fontSize:20,fontWeight:1000,color:C.b}}>{todaySentLI.count}</div><div className="muted" style={{fontSize:11}}>Last: {todaySentLI.last||"—"}</div></div></div><div className="divider" style={{margin:"14px 0"}}/><div><div style={{display:"flex",gap:12,padding:"9px 12px",background:C.bg1,borderRadius:12,marginBottom:8}}><span style={{fontSize:11,color:C.ts,width:64}}>08:00</span><span style={{width:8,height:8,borderRadius:"50%",background:C.g}}/><span>Apply — IT Interns West Rand (TUT reminder)</span></div></div><div style={{marginTop:12,display:"flex",gap:10}}><Btn onClick={()=>onNav("inbox")}>📩 Gmail</Btn><Btn onClick={()=>onNav("linkedin")}>🔗 LinkedIn</Btn><Btn onClick={()=>onNav("coach")}>✦ Life Coach</Btn></div></Card>
        </div>
      );
    }

    function GoalsView(){return (<div style={{padding:"26px 28px",overflowY:"auto"}}><div style={{fontSize:24,fontWeight:1000}}>Goals</div><div style={{display:"grid",gridTemplateColumns:"repeat(2,1fr)",gap:14,marginTop:18}}>{GOALS.map(g=><Card key={g.id}><div><Badge label={g.cat}/><div style={{fontSize:16,fontWeight:1000}}>{g.emoji} {g.title}</div></div><Bar pct={g.progress} color={g.color}/><div style={{marginTop:14}}>{g.milestones.map((m,i)=><div key={i} style={{display:"flex",gap:8,marginBottom:6}}><div style={{width:18,height:18,borderRadius:"50%",background:g.done.includes(i)?g.color:C.bg3,border:`2px solid ${g.done.includes(i)?g.color:C.border}`}}>{g.done.includes(i)?"✓":""}</div><div style={{fontSize:12,textDecoration:g.done.includes(i)?"line-through":"none"}}>{m}</div></div>)}</div>{g.notes && <div style={{marginTop:12,padding:10,background:C.bg2,borderRadius:12,fontSize:12}}>{g.notes}</div>}</Card>)}</div></div>);}
    function ProjectsView(){return (<div style={{padding:"26px 28px",overflowY:"auto"}}><div style={{fontSize:24,fontWeight:1000}}>Projects</div><div style={{display:"grid",gridTemplateColumns:"repeat(2,1fr)",gap:14,marginTop:16}}>{PROJECTS.map(p=><Card key={p.id}><div><Badge label={p.cat}/><div style={{fontWeight:1000}}>{p.name}</div><div className="muted" style={{fontSize:12,lineHeight:1.6}}>{p.desc}</div><div style={{display:"flex",flexWrap:"wrap",gap:6,margin:"8px 0"}}>{p.tech.map(t=><Badge key={t} label={t} color={p.color}/>)}</div>{p.live && <a href={p.live} target="_blank" className="btn btn-ghost" style={{display:"inline-block",marginRight:8}}>Live</a>}{p.code && <a href={p.code} target="_blank" className="btn btn-ghost">Code</a>}</div></Card>)}</div></div>);}
    function CertsView(){return (<div style={{padding:"26px 28px",overflowY:"auto"}}><div style={{fontSize:24,fontWeight:1000}}>Certificates</div><div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:12,marginTop:16}}>{CERTS.map(c=><Card key={c.id}><div style={{fontSize:24}}>{c.emoji}</div><div style={{fontWeight:1000}}>{c.name}</div><div className="muted" style={{fontSize:11}}>{c.issuer} · {c.year}</div><Badge label={c.tech[0]} color={c.color}/></Card>)}</div></div>);}
    function CalendarView(){return (<div style={{padding:"26px 28px",overflowY:"auto"}}><div style={{fontSize:24,fontWeight:1000}}>Calendar · June 2026</div><div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:2,marginTop:16}}>{Array.from({length:30},(_,i)=>{const day=i+1;const evts=CALENDAR_EVENTS.filter(e=>e.day===day);return (<div key={day} style={{background:day===2?C.pp:C.bg2,border:`1px solid ${day===2?C.pg:C.border}`,borderRadius:12,padding:8}}><div style={{fontSize:12,fontWeight:day===2?1000:800}}>{day}</div>{evts.map(e=><div key={e.time} style={{fontSize:10,background:e.color+"22",color:e.color,borderRadius:6,padding:"2px 4px",marginTop:2}}>{e.time} {e.title}</div>)}</div>)})}</div></div>);}
    function NotionView(){const [notes]=useState(NOTION_NOTES);const [active,setActive]=useState("n1");const note=notes.find(n=>n.id===active);return (<div style={{display:"flex",height:"100%"}}><div style={{width:240,borderRight:`1px solid ${C.border}`,padding:14}}>{notes.map(n=><div key={n.id} onClick={()=>setActive(n.id)} style={{padding:"10px 12px",borderRadius:12,background:active===n.id?C.bg3:"transparent",marginBottom:6,cursor:"pointer"}}><div style={{display:"flex",gap:8}}><span style={{width:8,height:8,borderRadius:"50%",background:n.color}}/><span style={{fontWeight:1000}}>{n.title}</span></div><div className="muted" style={{fontSize:11,marginLeft:16}}>{n.date}</div></div>)}</div><div style={{flex:1,padding:22,overflowY:"auto"}}><div style={{fontSize:18,fontWeight:1000}}>{note?.title}</div><div className="muted" style={{fontSize:12,marginBottom:16}}>{note?.date}</div><div style={{background:C.bg2,borderRadius:14,padding:16,whiteSpace:"pre-wrap",lineHeight:1.8}}>{note?.content}</div></div></div>);}
    function InboxView({onSentGmail}){const [sel,setSel]=useState(null);const [compose,setCompose]=useState(false);const [to,setTo]=useState("");const [subj,setSubj]=useState("");const [body,setBody]=useState("");const [aiDrafting,setAiDrafting]=useState(false);const [sendState,setSendState]=useState("idle");const email=sel?GMAIL_INBOX_DEMO.find(m=>m.id===sel):null;const sendNow=async()=>{if(!subj.trim()||!body.trim()||!to.trim()){setSendState("error");return;}setSendState("sending");await new Promise(r=>setTimeout(r,300));const evt={id:"g_"+Date.now(),channel:"gmail",dayKey:dayKeyJohannesburg(new Date()),to,subject:subj,preview:body.slice(0,90),at:new Date().toISOString()};addSentEvent(evt);onSentGmail?.(evt);setSendState("sent");setTimeout(()=>setCompose(false),600);};return (<div style={{display:"flex",height:"100%"}}><div style={{width:320,borderRight:`1px solid ${C.border}`,padding:12}}><Btn v="primary" onClick={()=>setCompose(true)} style={{width:"100%",marginBottom:12}}>✉️ Compose</Btn>{GMAIL_INBOX_DEMO.map(m=><div key={m.id} onClick={()=>setSel(m.id)} style={{padding:"10px 12px",borderRadius:12,background:sel===m.id?C.bg3:"transparent",marginBottom:6,cursor:"pointer"}}><div style={{display:"flex",gap:8}}><Av seed={m.name} label={m.avatar} color={m.avatarColor} size={28}/><div><div style={{fontWeight:m.unread?1000:800}}>{m.subject}</div><div className="muted" style={{fontSize:11}}>{m.name} · {m.time}</div></div></div></div>)}</div><div style={{flex:1,padding:22,overflowY:"auto"}}>{email?<><div style={{fontSize:18,fontWeight:1000}}>{email.subject}</div><div className="muted" style={{marginBottom:16}}>{email.from}</div><div style={{background:C.bg2,borderRadius:14,padding:16,whiteSpace:"pre-wrap"}}>{email.body}</div><div style={{marginTop:16,display:"flex",gap:10}}><Btn v="primary" onClick={()=>{setCompose(true);setTo(email.from);setSubj(`Re: ${email.subject}`);setBody("");}}>Reply with AI</Btn></div></>:<div className="muted">Select an email</div>}</div>{compose && <div style={{position:"absolute",bottom:0,right:0,width:500,background:C.bg1,border:`1px solid ${C.bh}`,borderRadius:"16px 16px 0 0",padding:20,zIndex:200}}><div style={{fontWeight:1000}}>New message</div><input placeholder="To" value={to} onChange={e=>setTo(e.target.value)} style={{width:"100%",background:C.bg2,marginTop:8,padding:8,borderRadius:8,border:`1px solid ${C.border}`,color:C.tx}}/><input placeholder="Subject" value={subj} onChange={e=>setSubj(e.target.value)} style={{width:"100%",background:C.bg2,marginTop:8,padding:8,borderRadius:8,border:`1px solid ${C.border}`,color:C.tx}}/><textarea placeholder="Body" rows={5} value={body} onChange={e=>setBody(e.target.value)} style={{width:"100%",background:C.bg2,marginTop:8,padding:8,borderRadius:8,border:`1px solid ${C.border}`,color:C.tx}}/><div style={{display:"flex",gap:10,marginTop:12,justifyContent:"flex-end"}}><Btn onClick={()=>setCompose(false)}>Cancel</Btn><Btn v="primary" onClick={sendNow} disabled={sendState==="sending"}>{sendState==="sending"?"Sending...":"Send"}</Btn></div></div>}</div>);}
    function LinkedInView({onSentLinkedIn}){const [compose,setCompose]=useState(false);const [target,setTarget]=useState("");const [msg,setMsg]=useState("");const [sendState,setSendState]=useState("idle");const sendMessage=async()=>{if(!target.trim()||!msg.trim()){setSendState("error");return;}setSendState("sending");await new Promise(r=>setTimeout(r,300));const evt={id:"li_"+Date.now(),channel:"linkedin",dayKey:dayKeyJohannesburg(new Date()),target,preview:msg.slice(0,90),at:new Date().toISOString()};addSentEvent(evt);onSentLinkedIn?.(evt);setSendState("sent");setTimeout(()=>setCompose(false),600);};return (<div style={{padding:"26px 28px"}}><div style={{fontSize:24,fontWeight:1000}}>LinkedIn Activity</div><Btn v="primary" onClick={()=>setCompose(true)} style={{margin:"16px 0"}}>✉️ Send Message</Btn><div style={{background:C.bg2,borderRadius:16,padding:16}}>{LI_NOTIFS_DEMO.map(n=><div key={n.id} style={{marginBottom:12,paddingBottom:8,borderBottom:`1px solid ${C.border}`}}><div style={{fontWeight:1000}}>{n.title}</div><div className="muted" style={{fontSize:12}}>{n.body}</div></div>)}</div>{compose && <Modal onClose={()=>setCompose(false)}><div><div style={{fontWeight:1000}}>Send LinkedIn Message</div><input placeholder="Recipient" value={target} onChange={e=>setTarget(e.target.value)} style={{width:"100%",marginTop:12,padding:10,background:C.bg2,borderRadius:12,border:`1px solid ${C.border}`,color:C.tx}}/><textarea placeholder="Message" rows={5} value={msg} onChange={e=>setMsg(e.target.value)} style={{width:"100%",marginTop:12,padding:10,background:C.bg2,borderRadius:12,border:`1px solid ${C.border}`,color:C.tx}}/><div style={{display:"flex",gap:10,marginTop:16,justifyContent:"flex-end"}}><Btn onClick={()=>setCompose(false)}>Cancel</Btn><Btn v="primary" onClick={sendMessage}>{sendState==="sending"?"Sending...":"Send"}</Btn></div></div></Modal>}</div>);}
    function CoachView({sync, todaySentG, todaySentLI}){const [prompt,setPrompt]=useState("");const [response,setResponse]=useState("");const askCoach=()=>{const os={gmailUnread:sync.gmail.unreadCount,liUnread:sync.linkedin.unreadCount,sentGCount:todaySentG.count,sentLICount:todaySentLI.count};const sys=buildLifeCoachPrompt(os);setResponse(`Personal OS (today): Gmail unread ${os.gmailUnread}, LinkedIn unread ${os.liUnread}, Gmail sent ${os.sentGCount}, LinkedIn sent ${os.sentLICount}. ${prompt ? `You asked: "${prompt}". Focus on applying to roles, improving portfolio, and networking.` : "Stay consistent with daily applications and refine your AI projects."}`);};return (<div style={{padding:"26px 28px"}}><div style={{fontSize:24,fontWeight:1000}}>✦ AI Life Coach</div><div style={{marginTop:16}}><textarea placeholder="Ask for career / productivity advice..." rows={3} value={prompt} onChange={e=>setPrompt(e.target.value)} style={{width:"100%",background:C.bg2,borderRadius:16,padding:12,border:`1px solid ${C.border}`,color:C.tx}}/><Btn v="primary" onClick={askCoach} style={{marginTop:12}}>Ask Coach</Btn></div>{response && <div style={{marginTop:24,background:C.bg3,borderRadius:16,padding:20,whiteSpace:"pre-wrap",lineHeight:1.8}}>{response}</div>}</div>);}

    /* ----------------------------- App Shell ----------------------------- */
    function App(){
      const [view,setView]=useState("today");
      const {sync}=useTodaySync();
      const [todaySentG,setTodaySentG]=useState({count:0,last:null});
      const [todaySentLI,setTodaySentLI]=useState({count:0,last:null});
      const refreshCounters=()=>{
        const key=dayKeyJohannesburg(new Date());
        const evts=loadSentEvents().filter(e=>e.dayKey===key);
        const g=evts.filter(e=>e.channel==="gmail");
        const l=evts.filter(e=>e.channel==="linkedin");
        setTodaySentG({count:g.length,last:g.length?new Date(g[g.length-1].at).toLocaleTimeString():null});
        setTodaySentLI({count:l.length,last:l.length?new Date(l[l.length-1].at).toLocaleTimeString():null});
      };
      useEffect(()=>{refreshCounters();const i=setInterval(refreshCounters,5000);return()=>clearInterval(i);},[]);
      const navItems=["today","goals","projects","certs","calendar","notion","inbox","linkedin","coach"];
      return (<div style={{display:"flex",height:"100%"}}><div style={{width:220,borderRight:`1px solid ${C.border}`,padding:"28px 16px",display:"flex",flexDirection:"column",gap:6}}><div style={{marginBottom:24,fontWeight:1000,fontSize:18,letterSpacing:-.5}}>⌘ Tiyani OS</div>{navItems.map(item=><button key={item} onClick={()=>setView(item)} style={{background:"transparent",border:"none",textAlign:"left",padding:"12px 16px",borderRadius:12,fontWeight:view===item?1000:700,color:view===item?C.pl:C.ts,background:view===item?C.bg3:"transparent",cursor:"pointer"}}>{item.charAt(0).toUpperCase()+item.slice(1)}</button>)}</div><div style={{flex:1,overflow:"hidden"}}>{view==="today" && <TodayView onNav={setView} sync={sync} todaySentG={todaySentG} todaySentLI={todaySentLI} nowStr={new Date().toLocaleTimeString()}/>}{view==="goals" && <GoalsView/>}{view==="projects" && <ProjectsView/>}{view==="certs" && <CertsView/>}{view==="calendar" && <CalendarView/>}{view==="notion" && <NotionView/>}{view==="inbox" && <InboxView onSentGmail={refreshCounters}/>}{view==="linkedin" && <LinkedInView onSentLinkedIn={refreshCounters}/>}{view==="coach" && <CoachView sync={sync} todaySentG={todaySentG} todaySentLI={todaySentLI}/>}</div></div>);
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
  </script>
</body>
</html>
