function Av({seed,label,size=34,color,sq}){
  const pal=["#7c3aed","#10b981","#f59e0b","#3b82f6","#ec4899","#ef4444","#0a66c2","#06b6d4"];
  const bg=color||pal[(seed||"A").charCodeAt(0)%pal.length];
  const init=(label||(seed||"?").split(" ").map(w=>w[0]).join("").slice(0,2)).toUpperCase();
  return (
    <div style={{
      width:size,height:size,borderRadius:sq?10:"50%",background:bg,color:"#fff",
      display:"flex",alignItems:"center",justifyContent:"center",fontWeight:900,fontSize:size*.36,
      flexShrink:0
    }}>{init}</div>
  );
}

/* ----------------------------- “Today” sent tracking ----------------------------- */
function tzJohannesburgDateKey(d=new Date()){
  // Format YYYY-MM-DD in Africa/Johannesburg without external libs
  const parts = new Intl.DateTimeFormat('en-CA', {
    timeZone: 'Africa/Johannesburg',
    year:'numeric', month:'2-digit', day:'2-digit'
  }).formatToParts(d);
  const get = (t)=>parts.find(p=>p.type===t)?.value;
  return `${get('year')}-${get('month')}-${get('day')}`;
}
const LS_KEY="tiyani_sent_events_v2";
function loadSentEvents(){
  try{ return JSON.parse(localStorage.getItem(LS_KEY)||"[]"); }catch{ return []; }
}
function saveSentEvents(evts){
  localStorage.setItem(LS_KEY, JSON.stringify(evts));
}
function addSentEvent(evt){
  const evts=loadSentEvents();
  evts.push(evt);
  saveSentEvents(evts);
}

/* ----------------------------- API layer (optional backend) ----------------------------- */
async function apiGetJSON(path){
  const r = await fetch(path, {headers:{"Accept":"application/json"}});
  if(!r.ok) throw new Error("API request failed");
  return await r.json();
}
async function apiPostJSON(path,body){
  const r = await fetch(path,{
    method:"POST",
    headers:{"Content-Type":"application/json","Accept":"application/json"},
    body:JSON.stringify(body)
  });
  if(!r.ok) throw new Error("API request failed");
  return await r.json();
}

function InboxView({onSentGmail}) {
  const [sel,setSel]=useState(null);
  const [compose,setCompose]=useState(false);
  const [to,setTo]=useState("");const [subj,setSubj]=useState("");const [body,setBody]=useState("");

  const [aiDrafting,setAiDrafting]=useState(false);
  const [sendState,setSendState]=useState("idle"); // idle | sending | sent | error
  const email=sel?GMAIL_INBOX_DEMO.find(m=>m.id===sel):null;

  const catColor={opportunity:C.g,security:C.r,social:C.b,promo:C.ts};

  const aiDraft=()=>{
    setAiDrafting(true);
    setTimeout(()=>{
      const isJob=email?.category==="opportunity";
      setBody(isJob
        ? `Dear Hiring Manager,\n\nThank you for the opportunity. My name is Tiyani Manganyi, a Junior Software Developer based in Pretoria with a Diploma in Computer Science from TUT.\n\nI have built 9+ projects including AI tools, e-commerce platforms, and real-time apps. My portfolio is live at gwende.vercel.app.\n\nI would love to apply for this role. Please find my details below:\n📧 kbmagoda2024@gmail.com\n📞 060 817 5627\n\nBest regards,\nTiyani Manganyi`
        : `Hi,\n\nThank you for your email. I’m reviewing this and will take the recommended steps to ensure security.\n\nBest regards,\nTiyani Manganyi\nkbmagoda2024@gmail.com`
      );
      setAiDrafting(false);
    },700);
  };

  const startCompose=()=>{
    setCompose(true);setSel(null);
    setTo("");setSubj("");setBody("");
    setAiDrafting(false);setSendState("idle");
  };

  const sendNow=async()=>{
    setSendState("sending");
    try{
      // If you implement backend, this will become true Gmail "sent today" live update.
      // Otherwise it will log locally so the UI still works.
      const created = await apiPostJSON("/api/gmail/send", {to, subject:subj, body})
        .catch(()=>null);

      const evt={
        id:"g_"+Date.now(),
        channel:"gmail",
        dayKey:tzJohannesburgDateKey(new Date()),
        to, subject:subj,
        preview:(body||"").slice(0,80),
        at:new Date().toISOString(),
        source: created?.messageId ? "api" : "local"
      };
      if(created){
        evt.providerMessageId = created.messageId;
      }
      addSentEvent(evt);
      onSentGmail?.(evt);
      setSendState("sent");
      setTimeout(()=>setCompose(false), 650);
    }catch(e){
      setSendState("error");
    }
  };

  return(
    <div style={{display:"flex",height:"100%",overflow:"hidden"}}>
      <div style={{width:320,borderRight:`1px solid ${C.border}`,display:"flex",flexDirection:"column"}}>
        <div style={{padding:"14px 16px 10px",borderBottom:`1px solid ${C.border}`}}>

            <div style={{width:36,height:36,borderRadius:12,background:"#ea4335",display:"flex",alignItems:"center",justifyContent:"center",fontSize:15,fontWeight:1000,color:"#fff"}}>M</div>
            <div>
              <div style={{fontSize:13,fontWeight:1000,color:C.tx}}>Gmail</div>
              <div style={{fontSize:11,color:C.tm}}>{ME.email}</div>
            </div>
          </div>
          <Btn v="primary" onClick={startCompose} style={{width:"100%",padding:"10px 14px"}}>
            ✉️ Compose
          </Btn>
        </div>

        <div style={{flex:1,overflowY:"auto"}}>
          {GMAIL_INBOX_DEMO.map(m=>(
            <div key={m.id}
              onClick={()=>setSel(m.id)}
              style={{
                padding:"12px 14px",
                borderBottom:`1px solid ${C.border}`,
                cursor:"pointer",
                background: sel===m.id ? C.bg3 : "transparent",
                borderLeft: sel===m.id ? `3px solid ${C.pl}` : `3px solid transparent`,

                <div style={{flex:1,minWidth:0}}>
                  <div style={{display:"flex",justifyContent:"space-between",gap:10,marginBottom:2}}>

                      {m.name}

                  </div>
                  <div style={{borderBottom:`1px solid ${C.border}`,padding:"8px 0",display:"grid",gridTemplateColumns:"70px 1fr",gap:10,alignItems:"center"}}>
                    <span className="muted" style={{fontSize:11,fontWeight:1000,textTransform:"uppercase",letterSpacing:.4}}>Subject</span>
                    <input value={subj} onChange={e=>setSubj(e.target.value)} style={{width:"100%",background:"transparent",border:"none",outline:"none",color:C.tx,fontSize:13,fontWeight:900}}/>
                  </div>
                </div>

                <div style={{position:"relative",marginTop:10,flex:1}}>
                  {aiDrafting && (
                    <div style={{
                      position:"absolute",inset:0,background:C.bg1+"d0",display:"flex",
                      alignItems:"center",justifyContent:"center",gap:10,color:C.pl,
                      fontWeight:1000,borderRadius:12,zIndex:2
                    }}>✦ Writing…</div>
                  )}
                  <textarea
                    value={body}
                    onChange={e=>setBody(e.target.value)}
                    placeholder="Write your message or click AI Draft…"
                    rows={6}
                    style={{
                      width:"100%",background:C.bg2,border:`1px solid ${C.border}`,
                      borderRadius:12,color:C.tx,fontSize:13,padding:"12px 12px",
                      outline:"none",resize:"none"
                    }}
                  />
                </div>

                <div style={{display:"flex",gap:10,justifyContent:"flex-end",marginTop:12}}>
                  <Btn onClick={()=>setCompose(false)} style={{opacity:.9}}>Cancel</Btn>
                  <Btn v="primary" onClick={sendNow} style={{minWidth:120,opacity:sendState==="sending"?0.7:1}}>
                    {sendState==="sending"?"Sending…":"↑ Send"}
                  </Btn>
                </div>
              </>
            )}
          </div>
        )}
      </div>
    </div>
  );
}
