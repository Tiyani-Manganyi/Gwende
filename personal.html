function Av({seed,label,size=34,color,sq}){
  const pal=["#7c3aed","#10b981","#f59e0b","#3b82f6","#ec4899","#ef4444","#0a66c2","#06b6d4"];
  const bg=color||pal[(seed||"A").charCodeAt(0)%pal.length];
  const init=(label||(seed||"?").split(" ").map(w=>w[0]).join("").slice(0,2)).toUpperCase();
  return <div style={{width:size,height:size,borderRadius:sq?10:"50%",background:bg,color:"#fff",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:800,fontSize:size*.36,flexShrink:0}}>{init}</div>;
}
function Badge({label,color=C.p,bg}){
  return <span style={{background:bg||(color+"18"),color,border:`1px solid ${color}28`,borderRadius:5,padding:"2px 9px",fontSize:11,fontWeight:600,whiteSpace:"nowrap"}}>{label}</span>;
}
function Bar({pct,color=C.p,h=6}){
  return <div style={{background:C.bg3,borderRadius:99,height:h,overflow:"hidden"}}><div style={{width:`${pct}%`,height:"100%",background:`linear-gradient(90deg,${color},${color}aa)`,borderRadius:99,transition:"width .5s"}}/></div>;
}
function Card({children,glow,style={}}){
  return <div style={{background:C.bg2,border:`1px solid ${glow?C.pg:C.border}`,borderRadius:14,padding:"18px 20px",...style}}>{children}</div>;
}
function Btn({children,onClick,v="ghost",style={}}){
  const s={ghost:{padding:"8px 16px",background:C.bg3,border:`1px solid ${C.border}`,color:C.ts},
    primary:{padding:"9px 20px",background:`linear-gradient(135deg,${C.p},${C.pl})`,border:"none",color:"#fff"},
    green:{padding:"8px 16px",background:C.gp,border:`1px solid ${C.g}33`,color:C.g}};
  return <button onClick={onClick} style={{...(s[v]||s.ghost),borderRadius:9,cursor:"pointer",fontSize:13,fontWeight:700,transition:"all .15s",...style}}>{children}</button>;
}
function Modal({children,onClose,wide}){
  return <div style={{position:"fixed",inset:0,background:"rgba(5,5,15,.88)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:500}} onClick={e=>e.target===e.currentTarget&&onClose()}>
    <div style={{background:C.bg1,border:`1px solid ${C.bh}`,borderRadius:18,padding:28,width:wide?"min(820px,96vw)":"min(560px,95vw)",maxHeight:"90vh",overflowY:"auto",animation:"fadeIn .2s ease",boxShadow:"0 40px 80px rgba(0,0,0,.7)"}}>{children}</div>
  </div>;
}

function VoiceAgent({onClose}){
  const [state,setState]=useState("idle");
  const [transcript,setTranscript]=useState("");
  const [response,setResponse]=useState("");
  const [history,setHistory]=useState([]);
  const recogRef=useRef(null);
  const synthRef=useRef(window.speechSynthesis);
  const VOICE_BOT={
    "who are you|your name|introduce":()=>`Hi! I'm Tiyani's AI Voice Assistant. Tiyani Manganyi is a Junior Software Developer from Pretoria, South Africa. He has 9 projects, 13 certifications, and is open to work. His email is kbmagoda2024@gmail.com.`,
    "project|built|portfolio":()=>`Tiyani has built 9 projects. Highlights include the AI Resume Analyzer, the TUT Job Portal, and the South African Case Law AI. You can see them all at gwende.vercel.app.`,
    "certificate|certification|qualification":()=>`Tiyani holds 13 plus certifications including an AWS Cloud Practitioner, Microsoft Azure AZ-900, FNB App Academy Full Stack, a Diploma in Computer Science from TUT, and more.`,
    "goal|objective|plan":()=>`Tiyani has 4 goals. First, land a junior developer role — he's at 55 percent progress. Second, complete the Graduate Programme. Third, launch Tiyani AI version 2 by Q3 2026. Fourth, become a Senior Developer by 2027.`,
    "email|gmail|inbox":()=>`Tiyani's Gmail is kbmagoda2024@gmail.com. There are ${GMAIL_INBOX.filter(m=>m.unread).length} unread emails including a TUT IT Interns reminder and LinkedIn job matches.`,
    "linkedin":()=>`Tiyani's LinkedIn is linkedin.com/in/tiyani-manganyi-137625316. There are ${LI_NOTIFS.filter(n=>n.unread).length} unread LinkedIn notifications including a message about a Junior Dev opportunity.`,
    "skill|technology|stack":()=>`Tiyani's top skills are React.js at 85%, Python at 80%, Node.js at 78%, MongoDB at 82%, NLP at 75%, and AWS Azure Cloud at 70%.`,
    "contact|phone|reach":()=>`You can reach Tiyani at kbmagoda2024@gmail.com, or call 060 817 5627. He's based in Pretoria, South Africa.`,
    "today|focus|priority":()=>`Today's top priority is applying to the IT Interns West Rand role — TUT sent a reminder this morning. Also check LinkedIn for 2 new job matches and the Takealot recruiter connection.`,
  };
  const getResponse=text=>{
    const l=text.toLowerCase();
    for(const [keys,fn] of Object.entries(VOICE_BOT)) if(keys.split("|").some(k=>l.includes(k))) return fn();
    return`I heard you say: "${text}". I can help with Tiyani's personal OS — Gmail, Notion, LinkedIn, Google Calendar, portfolio updates, projects, certificates, goals, skills, and today's plan. Try asking about any of those!`;
  };
  const speak=text=>{
    if(synthRef.current.speaking) synthRef.current.cancel();
    const utt=new SpeechSynthesisUtterance(text);
    utt.rate=1.05;utt.pitch=1;utt.volume=1;
    const voices=synthRef.current.getVoices();
    const pref=voices.find(v=>v.lang==="en-GB"||v.lang==="en-US")||voices[0];
    if(pref) utt.voice=pref;
    utt.onend=()=>setState("idle");
    utt.onerror=()=>setState("idle");
    synthRef.current.speak(utt);
    setState("speaking");
  };
  const startListening=()=>{
    const SpeechRec=window.SpeechRecognition||window.webkitSpeechRecognition;
    if(!SpeechRec){setResponse("Speech recognition not supported in this browser. Try Chrome.");return;}
    const recog=new SpeechRec();
    recog.lang="en-US";recog.continuous=false;recog.interimResults=false;
    recog.onstart=()=>setState("listening");
    recog.onresult=e=>{
      const t=e.results[0][0].transcript;
      setTranscript(t);
      setState("processing");
      setTimeout(()=>{const r=getResponse(t);setResponse(r);setHistory(h=>[...h,{user:t,ai:r}]);speak(r);},500);
    };
    recog.onerror=()=>{setState("idle");setResponse("Could not hear you. Please try again.");};
    recog.onend=()=>{if(state==="listening")setState("idle");};
    recogRef.current=recog;
    recog.start();
  };
  const stop=()=>{if(recogRef.current)recogRef.current.abort();if(synthRef.current.speaking)synthRef.current.cancel();setState("idle");};
  const stateConfig={idle:{color:C.p,icon:"🎙️",label:"Tap to speak",pulse:false},listening:{color:C.r,icon:"🔴",label:"Listening…",pulse:true},processing:{color:C.a,icon:"⚙️",label:"Processing…",pulse:false},speaking:{color:C.g,icon:"🔊",label:"Speaking…",pulse:false}};
  const sc=stateConfig[state];
  return(
    <Modal onClose={onClose} wide>
      <div style={{textAlign:"center",paddingTop:10}}>
        <div style={{fontSize:13,fontWeight:700,color:C.pl,marginBottom:4,letterSpacing:.5}}>VOICE AI AGENT</div>
        <div style={{fontSize:22,fontWeight:800,color:C.tx,marginBottom:4}}>Tiyani's AI Assistant</div>
        <div style={{fontSize:13,color:C.tm,marginBottom:28}}>Speak naturally — ask about projects, goals, certs, emails, skills</div>
        <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:4,height:48,marginBottom:24}}>
          {[3,5,8,12,7,4,9,14,6,10,5,8,12,7,4].map((h,i)=>(
            <div key={i} style={{width:4,borderRadius:2,background:sc.color,height:`${state==="listening"||state==="speaking"?h*3+Math.random()*10:h*2}px`,transition:"height .15s",opacity:state==="idle"?.4:1,animation:state==="listening"||state==="speaking"?`bounce ${.3+i*.05}s infinite alternate`:undefined}}/>
          ))}
        </div>
        <div style={{position:"relative",display:"inline-block",marginBottom:24}}>
          {sc.pulse&&<div style={{position:"absolute",inset:-8,borderRadius:"50%",background:sc.color,animation:"ripple 1.5s infinite",zIndex:0}}/>}
          <button onClick={state==="idle"?startListening:stop} style={{width:88,height:88,borderRadius:"50%",background:`linear-gradient(135deg,${sc.color},${sc.color}bb)`,border:"none",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",fontSize:34,position:"relative",zIndex:1,boxShadow:`0 0 0 4px ${sc.color}33`,transition:"all .2s"}}>{sc.icon}</button>
        </div>
        <div style={{fontSize:13,fontWeight:700,color:sc.color,marginBottom:24}}>{sc.label}</div>
        {(transcript||response)&&(
          <div style={{background:C.bg2,border:`1px solid ${C.border}`,borderRadius:14,padding:"16px 20px",marginBottom:20,textAlign:"left"}}>
            {transcript&&<div style={{marginBottom:10}}><div style={{fontSize:11,color:C.tm,fontWeight:700,marginBottom:4,letterSpacing:.4}}>YOU SAID</div><div style={{fontSize:14,color:C.tx,fontStyle:"italic"}}>"{transcript}"</div></div>}
            {response&&<div><div style={{fontSize:11,color:C.pl,fontWeight:700,marginBottom:4,letterSpacing:.4}}>AI RESPONSE</div><div style={{fontSize:14,color:C.ts,lineHeight:1.7}}>{response}</div></div>}
          </div>
        )}
        <div style={{marginBottom:16}}>
          <div style={{fontSize:11,color:C.tm,marginBottom:8,fontWeight:600}}>TRY SAYING…</div>
          <div style={{display:"flex",flexWrap:"wrap",gap:7,justifyContent:"center"}}>
            {["What projects have you built?","Tell me about your certifications","What are your goals?","Check my emails","What's today's focus?"].map(s=>(
              <button key={s} onClick={()=>{setTranscript(s);setState("processing");setTimeout(()=>{const r=getResponse(s);setResponse(r);setHistory(h=>[...h,{user:s,ai:r}]);speak(r);},400);}} style={{padding:"6px 13px",background:C.bg3,border:`1px solid ${C.border}`,borderRadius:20,color:C.ts,cursor:"pointer",fontSize:12,fontWeight:600}}>{s}</button>
            ))}
          </div>
        </div>
        {history.length>0&&(
          <div style={{maxHeight:180,overflowY:"auto",textAlign:"left"}}>
            <div style={{fontSize:11,color:C.tm,fontWeight:700,marginBottom:8,letterSpacing:.4}}>CONVERSATION HISTORY</div>
            {history.slice(-4).reverse().map((h,i)=>(
              <div key={i} style={{background:C.bg3,borderRadius:10,padding:"10px 13px",marginBottom:7}}>
                <div style={{fontSize:12,color:C.a,fontWeight:600,marginBottom:2}}>You: {h.user}</div>
                <div style={{fontSize:12,color:C.ts,lineHeight:1.5}}>{h.ai.slice(0,120)}{h.ai.length>120?"…":""}</div>
              </div>
            ))}
          </div>
        )}
        <Btn onClick={onClose} style={{marginTop:12}}>Close</Btn>
      </div>
    </Modal>
  );
}

            }}
              onMouseEnter={e => e.currentTarget.style.borderColor = C.bh}
              onMouseLeave={e => e.currentTarget.style.borderColor = isToday ? C.pg : C.border}>
              <div style={{fontSize: 12, fontWeight: isToday ? 800 : 500, color: isToday ? C.pl : C.ts, marginBottom: 3}}>
                {day}
              </div>
              {evts.map((ev, j) => (
                <div key={j} style={{fontSize: 10, background: ev.color + '22', color: ev.color, borderRadius: 4, padding: '2px 4px', marginBottom: 2, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap'}}>
                  {ev.title}
                </div>
              ))}
            </div>
          );
        })}
      </div>
    </div>
  );
}

function NotionView(){
  const [notes,setNotes]=useState(NOTION_NOTES);
  const [active,setActive]=useState("n1");
  const [editing,setEditing]=useState(false);
  const [content,setContent]=useState(notes[0].content);
  const note=notes.find(n=>n.id===active);
  const updateNote = (id, newContent) => {
    setNotes(notes.map(n => n.id === id ? {...n, content: newContent} : n));
  };
  const handleSave = () => {
    if(active){
      updateNote(active, content);
      setEditing(false);
    }
  };
  useEffect(()=>{
    if(note) setContent(note.content);
    setEditing(false);
  },[active, note]);
  return(
    <div style={{display:"flex",height:"100%"}}>
      <div style={{width:220,borderRight:`1px solid ${C.border}`,padding:14,display:"flex",flexDirection:"column",gap:5}}>
        <div style={{fontSize:12,fontWeight:700,color:C.tm,letterSpacing:.5,textTransform:"uppercase",padding:"0 8px 10px"}}>Notes</div>
        {notes.map(n=>(
          <div key={n.id} onClick={()=>{setActive(n.id);setEditing(false);}}
            style={{padding:"10px 12px",borderRadius:10,cursor:"pointer",background:active===n.id?C.bg3:"transparent",border:`1px solid ${active===n.id?C.bh:"transparent"}`}}>
            <div style={{display:"flex",gap:7,alignItems:"center",marginBottom:3}}>
              <div style={{width:8,height:8,borderRadius:"50%",background:n.color,flexShrink:0}}/>
              <span style={{fontSize:13,fontWeight:600,color:C.tx}}>{n.title}</span>
            </div>
            <div style={{fontSize:11,color:C.tm,marginLeft:15}}>{n.date}</div>
          </div>
        ))}
        <button onClick={()=>{const id=`n${Date.now()}`;setNotes(ns=>[...ns,{id:id,title:"New Note",color:C.b,date:"Jun 2",content:""}]);setActive(id);setContent("");setEditing(true);}} style={{marginTop:"auto",padding:"9px",background:C.pp,border:`1px solid ${C.pg}`,borderRadius:10,color:C.pl,cursor:"pointer",fontSize:13,fontWeight:700}}>+ New Note</button>
      </div>
      {note&&<div style={{flex:1,padding:"22px 28px",overflowY:"auto"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:18}}>
          <div style={{fontSize:18,fontWeight:800,color:C.tx}}>{note.title}</div>
          <button onClick={()=>editing?handleSave():setEditing(true)} style={{padding:"7px 15px",background:editing?C.gp:C.bg2,border:`1px solid ${editing?C.g+"40":C.border}`,borderRadius:9,color:editing?C.g:C.ts,cursor:"pointer",fontSize:13,fontWeight:700}}>{editing?"✓ Save":"Edit"}</button>
        </div>
        {editing
          ?<textarea value={content} onChange={e=>setContent(e.target.value)} style={{width:"100%",minHeight:300,background:C.bg2,border:`1px solid ${C.bh}`,borderRadius:12,padding:"14px 16px",color:C.tx,fontSize:14,lineHeight:1.9,resize:"vertical",fontFamily:"inherit",outline:"none"}}/>
          :<div style={{background:C.bg2,border:`1px solid ${C.border}`,borderRadius:12,padding:"14px 16px",color:C.ts,fontSize:14,lineHeight:1.9,whiteSpace:"pre-wrap",minHeight:200}}>{content}</div>
        }
      </div>}
    </div>
  );
}

        <div style={{width:36,height:36,borderRadius:10,background:`linear-gradient(135deg,${C.p},${C.pl})`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,marginBottom:8,animation:"pulse 3s infinite"}}>✦</div>
        {DOCK.map(d=>{

                onMouseEnter={e=>{if(!active){e.currentTarget.style.background=C.bg3;e.currentTarget.style.borderColor=C.bh;e.currentTarget.style.color=C.tx;}}}
                onMouseLeave={e=>{if(!active){e.currentTarget.style.background="transparent";e.currentTarget.style.borderColor=C.border;e.currentTarget.style.color=C.tm;}}} title={d.label}>
                {d.label}
                {badge>0&&<div style={{marginLeft:6,width:16,height:16,borderRadius:"50%",background:C.r,color:"#fff",fontSize:9,fontWeight:800,display:"flex",alignItems:"center",justifyContent:"center"}}>{badge}</div>}

        <div style={{height:42,background:C.bg1,borderBottom:`1px solid ${C.border}`,display:"flex",alignItems:"center",padding:"0 18px",gap:10,flexShrink:0}}>
          <div style={{fontSize:13,fontWeight:700,color:C.tx,flex:1}}>{DOCK.find(d=>d.id===view)?.label||"Tiyani OS"}</div>
          <div style={{fontSize:11,color:C.tm,display:"flex",alignItems:"center",gap:5}}><span style={{width:6,height:6,borderRadius:"50%",background:C.g}}/>kbmagoda2024@gmail.com</div>
          <div style={{position:"relative"}}>
            <button onClick={()=>setShowNotifs(!showNotifs)} style={{width:30,height:30,borderRadius:8,background:showNotifs?C.pp:"transparent",border:`1px solid ${showNotifs?C.pg:C.border}`,color:C.ts,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",fontSize:14,position:"relative"}}>🔔<div style={{position:"absolute",top:-2,right:-2,width:7,height:7,borderRadius:"50%",background:C.r,border:`1px solid ${C.bg1}`}}/></button>
            {showNotifs&&(
              <div style={{position:"absolute",top:36,right:0,width:320,background:C.bg1,border:`1px solid ${C.bh}`,borderRadius:14,padding:14,zIndex:300,boxShadow:"0 20px 60px rgba(0,0,0,.6)",animation:"fadeIn .2s ease"}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}><span style={{fontWeight:700,color:C.tx,fontSize:13}}>Notifications</span><button onClick={()=>setShowNotifs(false)} style={{background:"none",border:"none",color:C.tm,cursor:"pointer",fontSize:15}}>✕</button></div>
                {[
                  {icon:"📬",text:"TUT: IT Interns West Rand — apply today!",color:C.g,time:"10:53 AM"},
